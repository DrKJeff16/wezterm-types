name: Feature request
description: Suggest an idea for this project
title: "feat: <TITLE>"
labels:
  - enhancement
  - feature-request
assignees:
  - DrKJeff16
body:
  - type: checkboxes
    attributes:
      label: Checks
      options:
        - label: I have checked for existing issues related to this one, whether open or closed
          required: true
        - label: I have checked for existing PRs and none address this, whether open or closed
          required: true
  - type: textarea
    attributes:
      label: Suggestion Description
      description: Write down, as detailed as you can, about your suggestion
    validations:
      required: true
  - type: textarea
    attributes:
      label: How would this project improve?
      description: Describe clearly how would this project benefit from your suggestion
    validations:
      required: true
  - type: dropdown
    id: text_editor
    attributes:
      label: What text editor are you using?
      options:
        - Neovim
        - Vim
        - VSCode/VSCodium
        - Helix
        - Sublime Text
        - Pulsar
        - Notepad++
        - Kate
        - Other
    validations:
      required: true
  - type: input
    id: wezterm_version
    attributes:
      label: What version of WezTerm are you using?
      description: You can get it by running `wezterm --version` in your CLI.
      placeholder: wezterm 20250725-073938-dd6e5bd2
    validations:
      required: false
  - type: input
    id: os_version
    attributes:
      label: Operating System Version
      placeholder: Arch Linux 6.15.6-arch1-1
    validations:
      required: false
  - type: textarea
    attributes:
      label: Additional Context
      description: If there's more info you could tell, please do. Screenshots too, if applicable.
    validations:
      required: false
