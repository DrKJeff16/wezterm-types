name: "Missing or Bad Type"
description: "A type is missing/badly implemented? Please tell us!"
title: "type: <TITLE>"
labels:
  - bug
  - missing-types
  - wrong-types
assignees:
  - DrKJeff16
body:
  - type: checkboxes
    attributes:
      label: Checks
      options:
        - label: I have checked for existing issues related to this one, whether open or closed.
          required: true
        - label: I have checked for existing PRs and none address this, whether open or closed.
          required: true
        - label: I have read the [WezTerm Lua Reference](https://wezterm.org/config/lua/general.html) and can confirm this type is not deprecated.
          required: true
  - type: input
    attributes:
      label: What version of WezTerm are you using?
      description: You can run `wezterm --version` to retrieve it.
      placeholder: wezterm 20250725-073938-dd6e5bd2
    validations:
      required: true
  - type: dropdown
    id: text_editor
    attributes:
      label: What text editor are you using?
      options:
        - Neovim
        - Vim
        - VSCode/VSCodium
        - Helix
        - Sublime Text
        - Pulsar
        - Notepad++
        - Kate
        - Other
    validations:
      required: true
  - type: input
    attributes:
      label: Operating System Version
      placeholder: Arch Linux 6.15.6-arch1-1
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe The Issue
      description: Write down what's wrong, as detailed as you can. Avoid irrelevant info.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected Types
      description: Describe what were you expecting to happen.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional Info and/or Screenshots
      description: If there's more info you could tell, please do. Screenshots too, if applicable.
    validations:
      required: false
